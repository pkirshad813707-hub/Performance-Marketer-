<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nope.</title>

<link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    background:#000;
    color:#fff;

    font-family:"PP Neue Montreal",sans-serif;

    overflow:hidden;

}

/*========================*/

.hero{

    width:100%;
    height:100vh;

    position:relative;

}

/*========================*/

.text{

    position:absolute;

    right:5vw;
    bottom:4vw;

    display:flex;
    flex-direction:column;

    align-items:flex-end;

}

/*========================*/

.text h1{

    margin:0;

    font-weight:200;

    font-size:clamp(90px,8vw,180px);

    line-height:.82;

    letter-spacing:-0.07em;

    white-space:nowrap;

}

/* Individual alignment */

.no1{

    margin-right:-1vw;

}

.no2{

    margin-right:0;

}

.nope{

    margin-right:8vw;

}

.and{

    margin-right:3vw;

}

.hell{

    margin-right:15vw;

}

/*========================*/
/* Laptop */
/*========================*/

@media(max-width:1200px){

.text h1{

font-size:9vw;

}

}

/*========================*/
/* Tablet */
/*========================*/

@media(max-width:992px){

.text{

right:35px;
bottom:35px;

}

.text h1{

font-size:15vw;

}

.nope{

margin-right:12vw;

}

.and{

margin-right:4vw;

}

.hell{

margin-right:18vw;

}

}

/*========================*/
/* Mobile */
/*========================*/

@media(max-width:768px){

.text{

right:20px;
bottom:20px;

}

.text h1{

font-size:22vw;

letter-spacing:-0.05em;

}

.nope{

margin-right:15vw;

}

.and{

margin-right:6vw;

}

.hell{

margin-right:20vw;

}

}

</style>

</head>

<body>

<section class="hero">

    <div class="text">

        <h1 class="no1">No</h1>

        <h1 class="no2">No</h1>

        <h1 class="nope">Nope</h1>

        <h1 class="and">&</h1>

        <h1 class="hell">Hell Naw</h1>

    </div>

</section>

</body>
</html>
