<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do More</title>

    <!-- Load your PP Neue Montreal font -->
    <!-- Example:
    <link rel="stylesheet" href="fonts/pp-neue-montreal.css">
    -->

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:"PP Neue Montreal", sans-serif;
        }

        .text{
            color:#fff;
            line-height:0.9;
        }

        .small{
            font-size:60px;
            font-weight:300;
            letter-spacing:0.08em;
            text-transform:uppercase;
            display:block;
            margin-left:2px;
        }

        .large{
            font-size:220px;
            font-weight:300;
            letter-spacing:-0.05em;
            display:block;
        }
    </style>
</head>
<body>

    <div class="text">
        <span class="small">DO</span>
        <span class="large">More.</span>
    </div>

</body>
</html>
