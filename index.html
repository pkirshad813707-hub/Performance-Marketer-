<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>What you want?</title>

    <meta name="description" content="Get in touch with Irshad PK">

    <link rel="stylesheet" href="style.css">

    <!-- PP Neue Montreal -->
    <!--
    <link rel="stylesheet" href="fonts/pp-neue-montreal.css">
    -->

</head>

<body>

    <main class="hero">

        <div class="container">

            <h1>
                What you want<span>?</span>
            </h1>

            <form id="contactForm" class="search-box">

                <input
                    type="text"
                    id="message"
                    name="message"
                    placeholder="Type something..."
                    autocomplete="off"
                    required
                >

                <button
                    type="submit"
                    id="submitBtn">

                    Submit

                </button>

            </form>

            <p class="status" id="status"></p>

        </div>

    </main>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
