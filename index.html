<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What you want?</title>
<style>
  :root{
    --bg: #000000;
    --text: #ffffff;
    --muted: #7a7a7a;
    --border: #4a4a4a;
    --border-focus: #ffffff;
    --btn-bg: #eeeeee;
    --btn-text: #000000;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 900px;
  }

  h1 {
    font-weight: 200;
    font-size: clamp(2rem, 6vw, 4.2rem);
    color: var(--text);
    margin: 0 0 32px 0;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }

  form {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 8px 8px 28px;
    transition: border-color 0.2s ease;
  }

  form:focus-within {
    border-color: var(--border-focus);
  }

  input[type="text"] {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-style: italic;
    padding: 14px 0;
  }

  input[type="text"]::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  button {
    flex-shrink: 0;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.2s ease;
  }

  button:hover {
    background: #ffffff;
  }

  button:active {
    transform: scale(0.96);
  }

  button:focus-visible,
  input:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  /* Mobile: stack button below input if space is tight */
  @media (max-width: 480px) {
    form {
      flex-wrap: wrap;
      border-radius: 24px;
      padding: 16px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 4px;
    }
    button {
      width: 100%;
      padding: 14px 0;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>What you want?</h1>
    <form id="promptForm">
      <input type="text" id="promptInput" placeholder="Type something…" autocomplete="off">
      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('promptForm');
    const input = document.getElementById('promptInput');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const value = input.value.trim();
      if (!value) return;

      // Replace this with whatever action you need (API call, redirect, etc.)
      console.log('Submitted:', value);

      input.value = '';
      input.focus();
    });
  </script>
</body>
</html>
